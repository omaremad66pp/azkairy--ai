name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # نفس الإصدار المستخدم في بيئتك

      - name: Install dependencies
        run: flutter pub get

      - name: Create Android Project Structure Automatically
        run: |
          # هذا الأمر السحري سيقوم بإنشاء مجلد android والملفات الناقصة تلقائياً
          flutter create . --platforms=android

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: azkairy-ai-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
